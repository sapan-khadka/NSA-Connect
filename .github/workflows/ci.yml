name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secrets — gitleaks scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required for scanning full git history (recommended by gitleaks).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

  dependency-audit-backend:
    name: Dependency audit — backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install audit tooling
        run: pip install pip-audit==2.10.1 certifi

      - name: Audit Python dependencies (fail on high/critical)
        run: python scripts/dependency_audit.py

  dependency-audit-frontend:
    name: Dependency audit — frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Report moderate/low vulnerabilities (informational)
        run: |
          echo "=== npm audit (all severities) ==="
          npm audit --audit-level=low || true

      - name: Fail on high/critical vulnerabilities
        run: npm audit --audit-level=high

  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  ci-gate:
    name: CI — all checks passed
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - dependency-audit-backend
      - dependency-audit-frontend
      - backend
      - frontend
    if: always()

    steps:
      - name: Require every job to succeed
        run: |
          echo "gitleaks:                   ${{ needs.gitleaks.result }}"
          echo "dependency-audit-backend:   ${{ needs.dependency-audit-backend.result }}"
          echo "dependency-audit-frontend:    ${{ needs.dependency-audit-frontend.result }}"
          echo "backend:                    ${{ needs.backend.result }}"
          echo "frontend:                   ${{ needs.frontend.result }}"
          if [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.dependency-audit-backend.result }}" != "success" ] || \
             [ "${{ needs.dependency-audit-frontend.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo ""
            echo "CI failed — fix the failing job(s) above before merging."
            exit 1
          fi
          echo "All CI checks passed."
