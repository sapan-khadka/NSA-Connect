# Alembic configuration for NSA Connect
# Run all commands from the backend/ directory:
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# Fallback URL — env.py overrides this with app.core.config.settings.DATABASE_URL
sqlalchemy.url = postgresql://postgres:postgres@localhost:5433/nsa_connect

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
